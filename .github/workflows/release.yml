name: Release to npm

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to release
        required: true
        type: choice
        options:
          - pi-dev-worktrees
          - pi-dev-worktrees-dashboard-plugin
          - both
      version_bump:
        description: Version bump
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: Dry run (skip publish)
        required: false
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - run: npm ci

      - run: npm test --workspaces

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # OIDC trusted publishing: id-token: write permission lets the runner
      # generate an OIDC token. npm CLI detects the OIDC environment and
      # exchanges it for a short-lived publish token automatically.
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release pi-dev-worktrees
        if: ${{ inputs.package == 'pi-dev-worktrees' || inputs.package == 'both' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PKG_DIR="packages/pi-dev-worktrees"
          PKG_NAME="@lanquarden/pi-dev-worktrees"

          # Bump version
          npm version ${{ inputs.version_bump }} --no-git-tag-version --workspace=${PKG_DIR}
          NEW_VERSION=$(node -p "require('./${PKG_DIR}/package.json').version")

          # Skip if this version already published to npm (idempotent re-run)
          if npm view "${PKG_NAME}@${NEW_VERSION}" version >/dev/null 2>&1; then
            echo "${PKG_NAME}@${NEW_VERSION} already published, skipping"
            exit 0
          fi

          # Commit and tag (force tag to handle re-runs where tag exists from failed push)
          git add ${PKG_DIR}/package.json
          git commit -m "pi-dev-worktrees v${NEW_VERSION}" || echo "Nothing to commit"
          git tag -f -a "v${NEW_VERSION}" -m "pi-dev-worktrees v${NEW_VERSION}"
          git push origin HEAD
          git push origin "v${NEW_VERSION}"

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --dry-run --access public --workspace=${PKG_DIR}
            echo "Would create GitHub release: gh release create 'v${NEW_VERSION}' --title 'v${NEW_VERSION}' --generate-notes"
          else
            (cd ${PKG_DIR} && npm publish --access public)
            gh release create "v${NEW_VERSION}" --title "v${NEW_VERSION}" --generate-notes || echo "Release may already exist"
          fi

      - name: Build dashboard plugin
        if: ${{ inputs.package == 'pi-dev-worktrees-dashboard-plugin' || inputs.package == 'both' }}
        run: npm run build --workspace=packages/pi-dev-worktrees-dashboard-plugin

      - name: Release pi-dev-worktrees-dashboard-plugin
        if: ${{ inputs.package == 'pi-dev-worktrees-dashboard-plugin' || inputs.package == 'both' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PKG_DIR="packages/pi-dev-worktrees-dashboard-plugin"
          PKG_NAME="@lanquarden/pi-dev-worktrees-dashboard-plugin"

          # Bump version
          npm version ${{ inputs.version_bump }} --no-git-tag-version --workspace=${PKG_DIR}
          NEW_VERSION=$(node -p "require('./${PKG_DIR}/package.json').version")

          # Skip if this version already published to npm (idempotent re-run)
          if npm view "${PKG_NAME}@${NEW_VERSION}" version >/dev/null 2>&1; then
            echo "${PKG_NAME}@${NEW_VERSION} already published, skipping"
            exit 0
          fi

          # Commit and tag (force tag to handle re-runs where tag exists from failed push)
          git add ${PKG_DIR}/package.json
          git commit -m "pi-dev-worktrees-dashboard-plugin v${NEW_VERSION}" || echo "Nothing to commit"
          git tag -f -a "v${NEW_VERSION}" -m "pi-dev-worktrees-dashboard-plugin v${NEW_VERSION}"
          git push origin HEAD
          git push origin "v${NEW_VERSION}"

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --dry-run --access public --workspace=${PKG_DIR}
            echo "Would create GitHub release: gh release create 'v${NEW_VERSION}' --title 'v${NEW_VERSION}' --generate-notes"
          else
            (cd ${PKG_DIR} && npm publish --access public)
            gh release create "v${NEW_VERSION}" --title "v${NEW_VERSION}" --generate-notes || echo "Release may already exist"
          fi
