name: Release to npm (lockstep)

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version bump (applies to both packages)
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: Dry run (skip publish)
        required: false
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - run: npm ci

      - run: npm test --workspaces

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # OIDC trusted publishing: id-token: write permission lets the runner
      # generate an OIDC token. npm CLI detects the OIDC environment and
      # exchanges it for a short-lived publish token automatically.
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - name: Ensure up-to-date main (rebase/reset to origin/main)
        run: |
          git fetch origin --tags
          git checkout main
          git reset --hard origin/main

      - name: Build dashboard plugin
        run: npm run build --workspace=packages/pi-dev-worktrees-dashboard-plugin

      - name: Compute next version (lockstep)
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          # Make sure we base the bump on the latest remote tag
          git fetch --tags origin
          LAST_TAG=$(git tag --list 'v*' | sort -V | tail -n1)
          if [ -z "$LAST_TAG" ]; then BASE="0.0.0"; else BASE="${LAST_TAG#v}"; fi
          IFS='.' read -r MA MI PA <<< "$BASE"
          case "${{ inputs.version_bump }}" in
            major) MA=$((MA+1)); MI=0; PA=0 ;;
            minor) MI=$((MI+1)); PA=0 ;;
            patch) PA=$((PA+1)) ;;
            *) echo "Invalid bump"; exit 1 ;;
          esac
          NEXT_VERSION="$MA.$MI.$PA"
          echo "NEXT_VERSION=$NEXT_VERSION" | tee -a "$GITHUB_ENV"
          echo "Base: $BASE  ->  Next: $NEXT_VERSION"

      - name: Update package versions with npm (lockstep)
        env:
          NEXT_VERSION: ${{ env.NEXT_VERSION }}
        run: |
          npm version "$NEXT_VERSION" --no-git-tag-version --workspace=packages/pi-dev-worktrees
          npm version "$NEXT_VERSION" --no-git-tag-version --workspace=packages/pi-dev-worktrees-dashboard-plugin

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and tag
        env:
          NEXT_VERSION: ${{ env.NEXT_VERSION }}
        run: |
          git add packages/pi-dev-worktrees/package.json packages/pi-dev-worktrees-dashboard-plugin/package.json
          git commit -m "release v$NEXT_VERSION" || echo "Nothing to commit"
          git tag -f -a "v$NEXT_VERSION" -m "release v$NEXT_VERSION"
          git push origin HEAD
          git push origin "v$NEXT_VERSION"

      - name: Publish packages to npm (lockstep)
        env:
          NEXT_VERSION: ${{ env.NEXT_VERSION }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --dry-run --access public --workspace=packages/pi-dev-worktrees
            npm publish --dry-run --access public --workspace=packages/pi-dev-worktrees-dashboard-plugin
            echo "Would create GitHub release v$NEXT_VERSION"
          else
            (cd packages/pi-dev-worktrees && npm publish --access public)
            (cd packages/pi-dev-worktrees-dashboard-plugin && npm publish --access public)
            gh release create "v$NEXT_VERSION" --title "v$NEXT_VERSION" --generate-notes || echo "Release may already exist"
          fi
