name: Release to npm

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to release
        required: true
        type: choice
        options:
          - pi-dev-worktrees
          - pi-dev-worktrees-dashboard-plugin
          - both
      version_bump:
        description: Version bump
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: Dry run (skip publish)
        required: false
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm test --workspaces

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # OIDC trusted publishing: id-token: write permission lets the runner
      # generate an OIDC token that npm CLI exchanges automatically for a
      # short-lived publish token. No NODE_AUTH_TOKEN or NPM_TOKEN needed.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'
          cache: npm

      - run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release pi-dev-worktrees
        if: ${{ inputs.package == 'pi-dev-worktrees' || inputs.package == 'both' }}
        run: |
          npm version ${{ inputs.version_bump }} --no-git-tag-version --workspace=packages/pi-dev-worktrees
          NEW_VERSION=$(node -p "require('./packages/pi-dev-worktrees/package.json').version")
          git add packages/pi-dev-worktrees/package.json
          git commit -m "pi-dev-worktrees v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin HEAD --follow-tags
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --dry-run --access public --workspace=packages/pi-dev-worktrees
            echo "Would create GitHub release: gh release create 'v${NEW_VERSION}' --title 'v${NEW_VERSION}' --generate-notes"
          else
            npm publish --access public --workspace=packages/pi-dev-worktrees
            gh release create "v${NEW_VERSION}" --title "v${NEW_VERSION}" --generate-notes
          fi

      - name: Release pi-dev-worktrees-dashboard-plugin
        if: ${{ inputs.package == 'pi-dev-worktrees-dashboard-plugin' || inputs.package == 'both' }}
        run: |
          npm version ${{ inputs.version_bump }} --no-git-tag-version --workspace=packages/pi-dev-worktrees-dashboard-plugin
          NEW_VERSION=$(node -p "require('./packages/pi-dev-worktrees-dashboard-plugin/package.json').version")
          git add packages/pi-dev-worktrees-dashboard-plugin/package.json
          git commit -m "pi-dev-worktrees-dashboard-plugin v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin HEAD --follow-tags
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --dry-run --access public --workspace=packages/pi-dev-worktrees-dashboard-plugin
            echo "Would create GitHub release: gh release create 'v${NEW_VERSION}' --title 'v${NEW_VERSION}' --generate-notes"
          else
            npm publish --access public --workspace=packages/pi-dev-worktrees-dashboard-plugin
            gh release create "v${NEW_VERSION}" --title "v${NEW_VERSION}" --generate-notes
          fi
