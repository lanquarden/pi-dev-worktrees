name: Release to npm

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to release
        required: true
        type: choice
        options:
          - pi-dev-worktrees
          - pi-dev-worktrees-dashboard-plugin
          - both
      version_bump:
        description: Version bump
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: Dry run (skip publish)
        required: false
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm test --workspaces

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'
          cache: npm

      - run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release pi-dev-worktrees
        if: ${{ inputs.package == 'pi-dev-worktrees' || inputs.package == 'both' }}
        run: |
          npm version ${{ inputs.version_bump }} --workspace=packages/pi-dev-worktrees
          git push --follow-tags
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --dry-run --workspace=packages/pi-dev-worktrees
          else
            npm publish --workspace=packages/pi-dev-worktrees
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release pi-dev-worktrees-dashboard-plugin
        if: ${{ inputs.package == 'pi-dev-worktrees-dashboard-plugin' || inputs.package == 'both' }}
        run: |
          npm version ${{ inputs.version_bump }} --workspace=packages/pi-dev-worktrees-dashboard-plugin
          git push --follow-tags
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --dry-run --workspace=packages/pi-dev-worktrees-dashboard-plugin
          else
            npm publish --workspace=packages/pi-dev-worktrees-dashboard-plugin
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
